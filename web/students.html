<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tutor Flow - Ученики</title>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div x-data="studentsApp()" x-init="init()" class="app">
        <!-- Шапка -->
        <header class="header">
            <div class="header-content">
                <div class="logo">📚 Tutor Flow</div>
                <nav class="nav">
                    <a href="/static/dashboard.html">Дашборд</a>
                    <a href="/static/students.html" class="active">Ученики</a>
                    <a href="/static/schedule.html">Расписание</a>
                    <a href="/static/lessons.html">Уроки</a>
                    <a href="/static/invites.html">Приглашения</a>
                    <a href="/static/settings.html">Настройки</a>
                </nav>
                <div class="user-menu">
                    <span x-text="user?.first_name || 'Репетитор'"></span>
                    <button @click="logout()" class="btn-logout">Выйти</button>
                </div>
            </div>
        </header>

        <!-- Контент -->
        <main class="main">
            <div class="page-header">
                <h2>👥 Мои ученики</h2>
                <button @click="openModal()" class="btn-primary">➕ Добавить ученика</button>
            </div>

            <!-- Поиск и фильтр -->
            <div class="filters">
                <input type="text" x-model="search" @input="filterStudents()" placeholder="Поиск ученика..." class="search-input">
                <select x-model="filterStatus" @change="filterStudents()" class="filter-select">
                    <option value="all">Все статусы</option>
                    <option value="active">Активные</option>
                    <option value="paused">Приостановлены</option>
                    <option value="inactive">Неактивные</option>
                </select>
            </div>

            <!-- Список учеников -->
            <div class="students-grid">
                <template x-for="student in filteredStudents" :key="student.id">
                    <div class="student-card">
                        <div class="student-avatar" x-text="student.name.charAt(0)"></div>
                        <div class="student-info">
                            <h3 x-text="student.name"></h3>
                            <div class="student-meta">
                                <span x-text="student.telegram || 'Нет Telegram'"></span>
                                <span x-text="student.subject || 'Общий курс'"></span>
                            </div>
                            <div class="student-balance">
                                Осталось: <strong x-text="student.subscription?.remaining || 0"></strong> занятий
                            </div>
                        </div>
                        <div class="student-actions">
                            <span class="status-badge" :class="student.status" x-text="getStatusText(student.status)"></span>
                            <button @click="viewStudent(student.id)" class="icon-btn" title="Просмотр">👁️</button>
                            <button @click="deleteStudent(student.id)" class="icon-btn danger" title="Удалить">🗑️</button>
                        </div>
                    </div>
                </template>
                
                <div x-show="filteredStudents.length === 0" class="empty-state">
                    <span style="font-size: 48px;">👤</span>
                    <h3>Нет учеников</h3>
                    <p x-text="search ? 'Попробуйте изменить поиск' : 'Добавьте первого ученика!'"></p>
                    <button @click="openModal()" class="btn-primary" x-show="!search">➕ Добавить ученика</button>
                </div>
            </div>

            <!-- Модальное окно добавления ученика -->
            <div x-show="modalOpen" class="modal" @click.away="closeModal()">
                <div class="modal-content">
                    <div class="modal-header">
                        <h2>Добавить ученика</h2>
                        <button @click="closeModal()" class="close-btn">&times;</button>
                    </div>
                    <form @submit.prevent="addStudent()" class="modal-form">
                        <div class="form-group">
                            <label>Имя ученика *</label>
                            <input type="text" x-model="newStudent.name" placeholder="Введите имя" required>
                        </div>
                        <div class="form-group">
                            <label>Telegram ID</label>
                            <input type="text" x-model="newStudent.telegram" placeholder="@username или ID">
                        </div>
                        <div class="form-group">
                            <label>Предмет</label>
                            <input type="text" x-model="newStudent.subject" placeholder="Например: Английский язык">
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label>Количество занятий</label>
                                <input type="number" x-model="newStudent.lessons" min="1" value="10">
                            </div>
                            <div class="form-group">
                                <label>Цена за занятие (₽)</label>
                                <input type="number" x-model="newStudent.price" min="0" value="1500">
                            </div>
                        </div>
                        <div class="form-actions">
                            <button type="button" @click="closeModal()" class="btn-secondary">Отмена</button>
                            <button type="submit" class="btn-primary">Сохранить</button>
                        </div>
                    </form>
                </div>
            </div>
        </main>
    </div>

    <script src="/static/js/students.js"></script>
</body>
</html>
