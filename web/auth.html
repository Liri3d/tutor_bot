<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Авторизация через Telegram</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-box">
            <div class="auth-header">
                <h1>📚 Tutor Bot</h1>
                <p id="auth-status">⏳ Обработка авторизации...</p>
            </div>
            <div id="auth-result" class="auth-body"></div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const statusEl = document.getElementById('auth-status');
            const resultEl = document.getElementById('auth-result');

            // ===== 1. ПОЛУЧАЕМ ФРАГМЕНТ URL (часть после #) =====
            const hash = window.location.hash;
            console.log('🔍 Фрагмент URL:', hash);

            // ===== 2. ПРОВЕРЯЕМ, ЕСТЬ ЛИ ДАННЫЕ В ФРАГМЕНТЕ =====
            if (!hash || !hash.startsWith('#tgAuthResult=')) {
                statusEl.textContent = '❌ Ошибка авторизации';
                resultEl.innerHTML = `
                    <p style="color: #e53e3e;">Не получены данные от Telegram.</p>
                    <p style="font-size: 14px; color: #a0aec0;">Фрагмент: ${hash || 'пусто'}</p>
                    <button onclick="window.location.href='/'" class="btn-primary">Вернуться на главную</button>
                `;
                return;
            }

            // ===== 3. ИЗВЛЕКАЕМ И ДЕКОДИРУЕМ ДАННЫЕ =====
            try {
                // Убираем "#tgAuthResult=" и декодируем base64
                const encodedData = hash.substring('#tgAuthResult='.length);
                console.log('📦 Закодированные данные:', encodedData);
                
                // Преобразуем из base64url в base64
                const base64 = encodedData.replace(/-/g, '+').replace(/_/g, '/');
                const jsonString = atob(base64);
                const userData = JSON.parse(jsonString);
                
                console.log('✅ Данные пользователя:', userData);

                // ===== 4. ОТПРАВЛЯЕМ ДАННЫЕ НА БЕКЕНД =====
                const id = userData.id;
                const firstName = userData.first_name;
                const username = userData.username || '';
                const authDate = userData.auth_date;
                const hashParam = userData.hash;

                if (!id || !firstName || !authDate || !hashParam) {
                    throw new Error('Неполные данные от Telegram');
                }

                statusEl.textContent = '⏳ Проверка данных...';

                const url = `/api/auth/telegram?id=${id}&first_name=${encodeURIComponent(firstName)}&username=${encodeURIComponent(username)}&auth_date=${authDate}&hash=${hashParam}`;
                
                fetch(url)
                    .then(response => response.json())
                    .then(data => {
                        if (data.status === 'authenticated' || data.status === 'registered') {
                            // Сохраняем пользователя
                            localStorage.setItem('tutor_user', JSON.stringify({
                                telegram_id: data.telegram_id,
                                name: data.first_name,
                                role: data.role
                            }));
                            
                            statusEl.textContent = '✅ ' + data.message;
                            resultEl.innerHTML = `
                                <p style="color: #38a169; font-size: 18px;">✅ Авторизация успешна!</p>
                                <p>👤 ${data.first_name}</p>
                                <p>📌 Роль: ${data.role}</p>
                                <button onclick="window.location.href='/'" class="btn-primary">Перейти в дашборд</button>
                            `;
                            
                            // Перенаправляем через 1.5 секунды
                            setTimeout(() => {
                                window.location.href = '/';
                            }, 1500);
                        } else {
                            statusEl.textContent = '❌ Ошибка авторизации';
                            resultEl.innerHTML = `<p style="color: #e53e3e;">${data.message || 'Неизвестная ошибка'}</p>`;
                        }
                    })
                    .catch(error => {
                        console.error('❌ Ошибка запроса:', error);
                        statusEl.textContent = '❌ Ошибка подключения';
                        resultEl.innerHTML = `
                            <p style="color: #e53e3e;">Ошибка: ${error.message}</p>
                            <button onclick="window.location.href='/'" class="btn-primary">Вернуться на главную</button>
                        `;
                    });

            } catch (error) {
                console.error('❌ Ошибка парсинга данных:', error);
                statusEl.textContent = '❌ Ошибка обработки данных';
                resultEl.innerHTML = `
                    <p style="color: #e53e3e;">Ошибка: ${error.message}</p>
                    <button onclick="window.location.href='/'" class="btn-primary">Вернуться на главную</button>
                `;
            }
        });
    </script>
</body>
</html>
