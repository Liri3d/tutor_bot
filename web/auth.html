<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Авторизация через Telegram</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-box">
            <div class="auth-header">
                <h1>📚 Tutor Bot</h1>
                <p id="auth-status">⏳ Обработка авторизации...</p>
            </div>
            <div id="auth-result" class="auth-body"></div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Получаем параметры из URL
            const urlParams = new URLSearchParams(window.location.search);
            const id = urlParams.get('id');
            const firstName = urlParams.get('first_name');
            const username = urlParams.get('username');
            const authDate = urlParams.get('auth_date');
            const hash = urlParams.get('hash');
            
            const statusEl = document.getElementById('auth-status');
            const resultEl = document.getElementById('auth-result');

            // Если есть параметры — отправляем на бекенд
            if (id && hash) {
                fetch(`/api/auth/telegram?id=${id}&first_name=${encodeURIComponent(firstName)}&username=${encodeURIComponent(username || '')}&auth_date=${authDate}&hash=${hash}`)
                    .then(response => response.json())
                    .then(data => {
                        if (data.status === 'authenticated' || data.status === 'registered') {
                            // Сохраняем пользователя
                            localStorage.setItem('tutor_user', JSON.stringify({
                                telegram_id: data.telegram_id,
                                name: data.first_name,
                                role: data.role
                            }));
                            
                            statusEl.textContent = '✅ ' + data.message;
                            resultEl.innerHTML = `
                                <p style="color: #38a169; font-size: 18px;">✅ Авторизация успешна!</p>
                                <p>👤 ${data.first_name}</p>
                                <button onclick="window.location.href='/'" class="btn-primary">Перейти в дашборд</button>
                            `;
                            
                            // Перенаправляем через 2 секунды
                            setTimeout(() => {
                                window.location.href = '/';
                            }, 2000);
                        } else {
                            statusEl.textContent = '❌ Ошибка авторизации';
                            resultEl.innerHTML = `<p style="color: #e53e3e;">${data.message || 'Неизвестная ошибка'}</p>`;
                        }
                    })
                    .catch(error => {
                        statusEl.textContent = '❌ Ошибка подключения';
                        resultEl.innerHTML = `<p style="color: #e53e3e;">Ошибка: ${error.message}</p>`;
                    });
            } else {
                // Нет параметров — возможно, ошибка
                statusEl.textContent = '❌ Ошибка авторизации';
                resultEl.innerHTML = `
                    <p style="color: #e53e3e;">Не получены данные от Telegram.</p>
                    <button onclick="window.location.href='/'" class="btn-primary">Вернуться на главную</button>
                `;
            }
        });
    </script>
</body>
</html>
