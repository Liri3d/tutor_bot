<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Авторизация через Telegram</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-box">
            <div class="auth-header">
                <h1>📚 Tutor Bot</h1>
                <p id="auth-status">⏳ Обработка авторизации...</p>
            </div>
            <div id="auth-result" class="auth-body"></div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const statusEl = document.getElementById('auth-status');
            const resultEl = document.getElementById('auth-result');

            // ===== 1. ПРОВЕРЯЕМ ПАРАМЕТРЫ В URL =====
            const urlParams = new URLSearchParams(window.location.search);
            const hash = window.location.hash;

            // ===== 2. ПЫТАЕМСЯ ИЗВЛЕЧЬ ДАННЫЕ =====
            let id = urlParams.get('id');
            let firstName = urlParams.get('first_name');
            let username = urlParams.get('username');
            let authDate = urlParams.get('auth_date');
            let hashParam = urlParams.get('hash');

            // Если параметров нет в query, пробуем из фрагмента (#)
            if (!id && hash.startsWith('#tgAuthResult=')) {
                try {
                    const encoded = hash.substring('#tgAuthResult='.length);
                    const base64 = encoded.replace(/-/g, '+').replace(/_/g, '/');
                    const jsonString = atob(base64);
                    const data = JSON.parse(jsonString);
                    
                    id = data.id;
                    firstName = data.first_name;
                    username = data.username;
                    authDate = data.auth_date;
                    hashParam = data.hash;
                } catch (e) {
                    console.error('Ошибка парсинга hash:', e);
                }
            }

            // ===== 3. ЕСЛИ ЕСТЬ ДАННЫЕ — ОТПРАВЛЯЕМ НА БЕКЕНД =====
            if (id && hashParam) {
                statusEl.textContent = '⏳ Проверка данных...';
                
                const url = `/api/auth/telegram?id=${id}&first_name=${encodeURIComponent(firstName)}&username=${encodeURIComponent(username || '')}&auth_date=${authDate}&hash=${hashParam}`;
                
                fetch(url)
                    .then(response => response.json())
                    .then(data => {
                        if (data.status === 'authenticated' || data.status === 'registered') {
                            // Сохраняем пользователя
                            localStorage.setItem('tutor_user', JSON.stringify({
                                telegram_id: data.telegram_id,
                                name: data.first_name,
                                role: data.role
                            }));
                            
                            statusEl.textContent = '✅ ' + data.message;
                            resultEl.innerHTML = `
                                <p style="color: #38a169; font-size: 18px;">✅ Авторизация успешна!</p>
                                <p>👤 ${data.first_name}</p>
                                <p>📌 Роль: ${data.role}</p>
                                <button onclick="window.location.href='/'" class="btn-primary">Перейти в дашборд</button>
                            `;
                            
                            // Перенаправляем через 2 секунды
                            setTimeout(() => {
                                window.location.href = '/';
                            }, 2000);
                        } else {
                            statusEl.textContent = '❌ Ошибка авторизации';
                            resultEl.innerHTML = `<p style="color: #e53e3e;">${data.message || 'Неизвестная ошибка'}</p>`;
                        }
                    })
                    .catch(error => {
                        console.error('Ошибка запроса:', error);
                        statusEl.textContent = '❌ Ошибка подключения';
                        resultEl.innerHTML = `
                            <p style="color: #e53e3e;">Ошибка: ${error.message}</p>
                            <button onclick="window.location.href='/'" class="btn-primary">Вернуться на главную</button>
                        `;
                    });
            } else {
                // Нет данных — показываем ошибку
                statusEl.textContent = '❌ Ошибка авторизации';
                resultEl.innerHTML = `
                    <p style="color: #e53e3e;">Не получены данные от Telegram.</p>
                    <p style="font-size: 14px; color: #a0aec0;">Параметры: id=${id}, hash=${hashParam}</p>
                    <button onclick="window.location.href='/'" class="btn-primary">Вернуться на главную</button>
                `;
            }
        });
    </script>
</body>
</html>
