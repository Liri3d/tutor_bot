<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tutor Flow - Регистрация</title>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div x-data="registerApp()" x-init="init()" class="container">
        <div class="auth-card">
            <div class="logo">📚 Tutor Flow</div>
            <h1>Регистрация репетитора</h1>
            <p class="subtitle">Создайте аккаунт для управления расписанием</p>

            <!-- Сообщение -->
            <div x-show="message" class="message" x-text="message"></div>

            <!-- Форма регистрации -->
            <form @submit.prevent="register()" class="auth-form">
                <div class="form-group">
                    <label>Имя *</label>
                    <input 
                        type="text" 
                        x-model="form.first_name" 
                        placeholder="Введите ваше имя"
                        required
                        minlength="2"
                    >
                    <small class="hint">Минимум 2 символа</small>
                </div>

                <div class="form-group">
                    <label>Логин *</label>
                    <input 
                        type="text" 
                        x-model="form.login" 
                        placeholder="Придумайте логин"
                        required
                        minlength="3"
                    >
                    <small class="hint">Минимум 3 символа, только латиница и цифры</small>
                </div>

                <div class="form-group">
                    <label>Пароль *</label>
                    <input 
                        type="password" 
                        x-model="form.password" 
                        placeholder="Минимум 6 символов"
                        required
                        minlength="6"
                    >
                    <small class="hint">Минимум 6 символов</small>
                </div>

                <div class="form-group">
                    <label>Подтвердите пароль *</label>
                    <input 
                        type="password" 
                        x-model="form.confirmPassword" 
                        placeholder="Повторите пароль"
                        required
                    >
                </div>

                <!-- Ошибки -->
                <div x-show="error" class="error" x-text="error"></div>

                <!-- Кнопка -->
                <button 
                    type="submit" 
                    class="btn-primary" 
                    :disabled="loading"
                    x-text="loading ? 'Регистрация...' : 'Зарегистрироваться'"
                ></button>
            </form>

            <!-- Ссылка на вход -->
            <div class="auth-footer">
                <span>Уже есть аккаунт?</span>
                <a href="/static/index.html">Войти</a>
            </div>
        </div>
    </div>

    <script src="/static/js/register.js"></script>
</body>
</html>
