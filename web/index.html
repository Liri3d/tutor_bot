<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tutor Bot — Веб-клиент</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="app">
        <header>
            <h1>📚 Tutor Bot</h1>
            <p>Управление расписанием репетитора</p>
        </header>

        <main>
            <!-- Форма ввода Telegram ID -->
            <!-- <section id="auth-section">
                <h2>Вход</h2>
                <div class="form-group">
                    <label for="telegram-id">Ваш Telegram ID:</label>
                    <input type="number" id="telegram-id" placeholder="123456789">
                    <button id="login-btn">Войти</button>
                </div>
                <p class="hint">Получите свой Telegram ID через @userinfobot</p>
            </section> -->

            <section id="auth-section">
                <h2>🔐 Вход в систему</h2>

                <!-- <div class="form-group">
                    <label>Войти через Telegram:</label>
                    <a id="telegram-login-link" href="#" class="telegram-login-btn">
                        🔐 Войти через Telegram
                    </a>
                    <small class="hint">Нажмите для входа через Telegram</small>
                </div> -->

                <div class="auth-body">
                    <!-- ===== ВКЛАДКИ ===== -->
                    <div class="tabs">
                        <button class="tab-btn active" data-tab="login">Вход</button>
                        <button class="tab-btn" data-tab="register">Регистрация</button>
                    </div>

                    <!-- ===== ВХОД ===== -->
                    <div id="tab-login" class="tab-content active">
                        <div class="form-group">
                            <label for="login-input">Логин</label>
                            <input type="text" id="login-input" placeholder="Введите логин">
                        </div>
                        <div class="form-group">
                            <label for="password-input">Пароль</label>
                            <input type="password" id="password-input" placeholder="Введите пароль">
                        </div>
                        <button id="login-btn" class="btn-primary">🔐 Войти</button>
                        <div id="login-error" class="error-message"></div>
                    </div>

                    <!-- ===== РЕГИСТРАЦИЯ ===== -->
                    <div id="tab-register" class="tab-content">
                        <div class="form-group">
                            <label for="reg-login">Логин</label>
                            <input type="text" id="reg-login" placeholder="Придумайте логин">
                            <small class="hint">Только латиница и цифры</small>
                        </div>
                        <div class="form-group">
                            <label for="reg-name">Ваше имя</label>
                            <input type="text" id="reg-name" placeholder="Как к вам обращаться">
                        </div>
                        <div class="form-group">
                            <label for="reg-password">Пароль</label>
                            <input type="password" id="reg-password" placeholder="Минимум 6 символов">
                        </div>
                        <div class="form-group">
                            <label for="reg-confirm">Подтвердите пароль</label>
                            <input type="password" id="reg-confirm" placeholder="Повторите пароль">
                        </div>
                        <button id="register-btn" class="btn-primary">✅ Зарегистрироваться</button>
                        <div id="register-error" class="error-message"></div>
                        <div id="register-success" class="success-message" style="display:none;"></div>
                    </div>
                </div>

            </section>

            <!-- Основной контент -->
            <section id="dashboard-section" style="display: none;">
                <div class="stats-grid">
                    <div class="stat-card">
                        <h3>📊 Всего учеников</h3>
                        <span id="total-students">0</span>
                    </div>
                    <div class="stat-card">
                        <h3>📅 Занятий за неделю</h3>
                        <span id="lessons-week">0</span>
                    </div>
                    <div class="stat-card">
                        <h3>👥 Активных учеников</h3>
                        <span id="active-students">0</span>
                    </div>
                </div>

                <div class="section">
                    <h2>👤 Мои ученики</h2>
                    <div id="students-list">
                        <p class="loading">Загрузка...</p>
                    </div>
                </div>

                <div class="section">
                    <h2>📨 Активные приглашения</h2>
                    <div id="invites-list">
                        <p class="loading">Загрузка...</p>
                    </div>
                </div>

                <div class="section">
                    <h2>➕ Создать приглашение</h2>
                    <div class="form-group inline">
                        <input type="text" id="student-name" placeholder="Имя ученика">
                        <button id="create-invite-btn">Создать</button>
                    </div>
                    <div id="invite-result"></div>
                </div>

                <button id="logout-btn" class="btn-logout">🚪 Выйти</button>
            
            </section>
        </main>

        <footer>
            <p>© Tutor Bot — версия 1.0</p>
        </footer>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
